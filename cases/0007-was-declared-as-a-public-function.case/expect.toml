# Historique du bug (fixé, voir expect.md) : la classe S3 enregistrée pour un
# paramètre kinded-generic (`%T`) venait de deux chemins de calcul distincts
# qui pouvaient diverger — `get_class_unquoted` retombait sur `t.pretty()`
# ("%T", une classe qu'aucun objet R ne porte jamais) côté
# `registerS3method`, et le nom de méthode exporté (`animate_move.RecordN`)
# était calculé avec un contexte différent (`cont`) de celui qui définissait
# réellement la fonction (`inner_cont`), donnant deux `N` différents et un
# `objet '...' introuvable` à l'exécution. Correctif : fallback `"default"`
# partout (jamais `"Generic"`/`t.pretty()`), et la boucle d'export utilise
# `inner_cont` de bout en bout.
#
# 2026-07-18 : oracle upgradé de transpile-time (grep sur R/animation.R,
# pinnant le suffixe `RecordN` exact) vers r-run. `RecordN` est un compteur
# interne non sémantique qui dérive légitimement dès qu'un changement stdlib
# sans rapport enregistre un type structurel anonyme de plus ailleurs dans le
# programme (confirmé : `Record4` → `Record5` sans aucun changement de
# comportement — `typr run` sur ce repro réussit, exit 0). Un `file =
# "R/animation.R"` golden-diffé re-casserait à chaque futur renumérotage
# anodin. Exécuter réellement le programme teste l'invariant qui compte
# vraiment (le nom exporté correspond à ce qui est défini, le dispatch
# atteint `.default`) sans dépendre du numéro.
[[rule]]
file = "@run"
must_not_contain = "introuvable"
[[rule]]
file = "@run"
must_not_contain = "no applicable method"
[[rule]]
file = "@run"
must_contain = "animate successful"
