# Règles oracle (grep sur le R généré).

# `use scene::add;` doit réussir : `add` doit être importé concrètement
# depuis le module scene, pas rejeté comme un faux conflit avec les
# surcharges stdlib `add(int,int)` / `add(num,num)`.
[[rule]]
file = "R/main.R"
must_contain = "add <- scene$add"

# L'appel `sc.add(c1)` doit résoudre la surcharge `add.Scene`, pas échouer
# avec "Function add<...> not defined in this scope" (qui transpile alors
# en `NA`/placeholder).
[[rule]]
file = "R/main.R"
must_contain = "print(add(sc, c1))"
[[rule]]
file = "R/main.R"
must_not_contain = "print(NA)"
