# Règles oracle (grep sur le R généré).
#
# Anomalie centrale : `[] as! [Object]` (et `[] as! [Animation]`) dans le
# corps de `new_scene` était annoté `|> as.Generic()` au lieu d'un
# `|> as.ArrayN()` enregistré — la valeur ne portait donc jamais la classe
# du type de paramètre `[Object]` de `new_storyboard`, et le dispatch S3
# `new_storyboard.ArrayN` échouait à l'exécution ("pas de méthode pour
# 'new_storyboard' applicable pour un objet de classe c('typed_vec',
# 'Generic', 'Any')").

# Les vecteurs vides castés de new_scene doivent recevoir un vrai cast typé…
[[rule]]
file = "R/scene.R"
must_contain = "objects = typed_vec(dim = c(0)) |> as.Array"

# …et plus jamais le fallback as.Generic().
[[rule]]
file = "R/scene.R"
must_not_contain = "typed_vec(dim = c(0)) |> as.Generic()"

[[rule]]
file = "R/storyboard.R"
must_not_contain = "typed_vec(dim = c(0)) |> as.Generic()"

# `snapshot` est une fonction privée du module storyboard, émise comme
# méthode S3 (`snapshot.StoryBoard`) : un stub générique doit exister dans
# le local() pour que les appels internes (`snapshots.StoryBoard`)
# puissent dispatcher.
[[rule]]
file = "R/storyboard.R"
must_contain = "UseMethod(\"snapshot\")"

# `Circle` est un sous-type structurel de `Position` (défini dans un autre
# module) : sa chaîne de classes doit contenir Position pour que
# `move(c1, ...)` dispatch sur `move.Position`.
[[rule]]
file = "R/circle.R"
must_contain = "class(x) <- c(\"Circle\", \"Position\""

# L'appel de main.ty doit transpiler vers le générique `move` (le dispatch
# se fait via la chaîne de classes de c1).
[[rule]]
file = "R/main.R"
must_contain = "move(c1"
